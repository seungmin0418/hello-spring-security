<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>홈 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .welcome-card { border: none; border-radius: 16px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .stat-card { border: none; border-radius: 12px; transition: transform .2s; }
        .stat-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,.12); }
        .badge-role { font-size: .75rem; padding: .4em .7em; border-radius: 20px; }
    </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link active" th:href="@{/home}">홈</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/products/add}">상품 등록</a>
                </li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/admin/dashboard}">관리자</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/user/password}">비밀번호 변경</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-flex">
                <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
            </form>
        </div>
    </div>
</nav>

<div class="container">
    <!-- Welcome Card -->
    <div class="welcome-card p-4 mb-4">
        <h4 class="fw-bold mb-1">환영합니다!</h4>
        <p class="mb-1 opacity-75" th:text="${username}"></p>
        <div class="mt-2">
            <!-- 컨트롤러에서 ROLE_ 접두사를 제거한 문자열 목록을 전달받음 -->
            <span th:each="role : ${roles}"
                  class="badge bg-white text-dark badge-role me-1"
                  th:text="${role}"></span>
        </div>
    </div>

    <!-- Quick Links -->
    <div class="row g-3">
        <div class="col-md-4">
            <div class="card stat-card p-4 h-100">
                <h6 class="fw-bold">상품 목록</h6>
                <p class="text-muted small mb-3">등록된 상품을 조회합니다.</p>
                <a th:href="@{/products}" class="btn btn-primary btn-sm mt-auto">바로가기</a>
            </div>
        </div>
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <div class="card stat-card p-4 h-100">
                <h6 class="fw-bold">상품 등록</h6>
                <p class="text-muted small mb-3">새 상품을 등록합니다. (관리자 전용)</p>
                <a th:href="@{/products/add}" class="btn btn-success btn-sm mt-auto">바로가기</a>
            </div>
        </div>
        <div class="col-md-4" sec:authorize="hasRole('ADMIN')">
            <div class="card stat-card p-4 h-100">
                <h6 class="fw-bold">관리자 대시보드</h6>
                <p class="text-muted small mb-3">시스템 관리 메뉴입니다. (관리자 전용)</p>
                <a th:href="@{/admin/dashboard}" class="btn btn-warning btn-sm mt-auto">바로가기</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center text-muted py-3 mt-4" style="border-top: 1px solid #dee2e6; font-size: 0.85rem;">
    실습 수행 일시: <span id="datetime"></span> &nbsp;|&nbsp; 학번: 2171203 &nbsp;|&nbsp; 성명: 이승민
</footer>
<script>
    function updateTime() {
        const now = new Date();
        const days = ['일','월','화','수','목','금','토'];
        const year = now.getFullYear();
        const month = now.getMonth()+1;
        const date = now.getDate();
        const day = days[now.getDay()];
        const hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2,'0');
        const seconds = String(now.getSeconds()).padStart(2,'0');
        const ampm = hours >= 12 ? '오후' : '오전';
        const h = hours % 12 || 12;
        document.getElementById('datetime').textContent =
            `${year}년 ${month}월 ${date}일 (${day}) ${ampm} ${String(h).padStart(2,'0')}:${minutes}:${seconds}`;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>
</body>
</html>
