<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - HanSung</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; }
        .card { border: none; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); }
        .brand-logo { font-size: 2rem; font-weight: 800; color: #e94560; letter-spacing: -1px; }
        .btn-success-custom { background: #22c55e; border-color: #22c55e; color: #fff; }
        .btn-success-custom:hover { background: #16a34a; border-color: #16a34a; color: #fff; }
        .form-control:focus { border-color: #e94560; box-shadow: 0 0 0 0.2rem rgba(233,69,96,.25); }
    </style>
</head>
<body class="d-flex align-items-center justify-content-center">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-sm-8 col-md-6 col-lg-4">
            <div class="card">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <div class="brand-logo">HanSung</div>
                        <p class="text-muted mt-1 mb-0">새 계정 만들기</p>
                    </div>

                    <div th:if="${emailExists}" class="alert alert-danger py-2 text-center" role="alert">
                        이미 사용 중인 이메일입니다.
                    </div>

                    <form th:action="@{/signup}" th:object="${user}" method="post">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">이메일</label>
                            <input type="email" th:field="*{email}" class="form-control form-control-lg"
                                   placeholder="example@hansung.ac.kr" required autofocus/>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-semibold">비밀번호</label>
                            <input type="password" th:field="*{password}" class="form-control form-control-lg"
                                   placeholder="비밀번호 입력" required/>
                        </div>
                        <button type="submit" class="btn btn-success-custom btn-lg w-100 fw-semibold">회원가입</button>
                    </form>

                    <hr class="my-4">
                    <p class="text-center text-muted mb-0">
                        이미 계정이 있으신가요?
                        <a th:href="@{/login}" class="text-decoration-none fw-semibold" style="color:#e94560">로그인</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>
<footer class="text-center text-muted py-3 mt-4" style="border-top: 1px solid #dee2e6; font-size: 0.85rem;">
    실습 수행 일시: <span id="datetime"></span> &nbsp;|&nbsp; 학번: 2171203 &nbsp;|&nbsp; 성명: 이승민
</footer>
<script>
    function updateTime() {
        const now = new Date();
        const days = ['일','월','화','수','목','금','토'];
        const year = now.getFullYear();
        const month = now.getMonth()+1;
        const date = now.getDate();
        const day = days[now.getDay()];
        const hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2,'0');
        const seconds = String(now.getSeconds()).padStart(2,'0');
        const ampm = hours >= 12 ? '오후' : '오전';
        const h = hours % 12 || 12;
        document.getElementById('datetime').textContent =
            `${year}년 ${month}월 ${date}일 (${day}) ${ampm} ${String(h).padStart(2,'0')}:${minutes}:${seconds}`;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>
</body>
</html>
