<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <title>비밀번호 변경 - HanSung</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #f8f9fa; }
    .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
    .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
    .form-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
    .page-header { border-left: 4px solid #e94560; padding-left: 1rem; }
    .btn-change { background: #e94560; border-color: #e94560; }
    .btn-change:hover { background: #c73652; border-color: #c73652; }
  </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" th:href="@{/home}">HanSung</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" th:href="@{/home}">홈</a></li>
        <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
      </ul>
      <form th:action="@{/logout}" method="post" class="d-flex">
        <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
      </form>
    </div>
  </div>
</nav>

<div class="container">
  <div class="page-header mb-4">
    <h4 class="fw-bold mb-0">비밀번호 변경</h4>
    <small class="text-muted">현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</small>
  </div>

  <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

  <div class="row justify-content-center">
    <div class="col-lg-6">
      <div class="card form-card">
        <div class="card-body p-5">
          <form th:action="@{/user/password}" th:object="${passwordChangeDto}" method="post">
            <div class="mb-3">
              <label class="form-label fw-semibold">현재 비밀번호 <span class="text-danger">*</span></label>
              <input type="password" th:field="*{currentPassword}" class="form-control form-control-lg"
                     placeholder="현재 비밀번호 입력"/>
              <div class="text-danger small" th:if="${#fields.hasErrors('currentPassword')}"
                   th:errors="*{currentPassword}"></div>
            </div>
            <div class="mb-3">
              <label class="form-label fw-semibold">새 비밀번호 <span class="text-danger">*</span></label>
              <input type="password" th:field="*{newPassword}" class="form-control form-control-lg"
                     placeholder="새 비밀번호 입력 (8자 이상)"/>
              <div class="text-danger small" th:if="${#fields.hasErrors('newPassword')}"
                   th:errors="*{newPassword}"></div>
            </div>
            <div class="mb-4">
              <label class="form-label fw-semibold">새 비밀번호 확인 <span class="text-danger">*</span></label>
              <input type="password" th:field="*{confirmPassword}" class="form-control form-control-lg"
                     placeholder="새 비밀번호 재입력"/>
              <div class="text-danger small" th:if="${#fields.hasErrors('confirmPassword')}"
                   th:errors="*{confirmPassword}"></div>
            </div>
            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-change text-white btn-lg flex-grow-1 fw-semibold">변경</button>
              <a th:href="@{/home}" class="btn btn-outline-secondary btn-lg px-4">취소</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<footer class="text-center text-muted py-3 mt-4" style="border-top: 1px solid #dee2e6; font-size: 0.85rem;">
  실습 수행 일시: <span id="datetime"></span> &nbsp;|&nbsp; 학번: 2171203 &nbsp;|&nbsp; 성명: 이승민
</footer>
<script>
  function updateTime() {
      const now = new Date();
      const days = ['일','월','화','수','목','금','토'];
      const year = now.getFullYear();
      const month = now.getMonth()+1;
      const date = now.getDate();
      const day = days[now.getDay()];
      const hours = now.getHours();
      const minutes = String(now.getMinutes()).padStart(2,'0');
      const seconds = String(now.getSeconds()).padStart(2,'0');
      const ampm = hours >= 12 ? '오후' : '오전';
      const h = hours % 12 || 12;
      document.getElementById('datetime').textContent =
          `${year}년 ${month}월 ${date}일 (${day}) ${ampm} ${String(h).padStart(2,'0')}:${minutes}:${seconds}`;
  }
  updateTime();
  setInterval(updateTime, 1000);
</script>
</body>
</html>
